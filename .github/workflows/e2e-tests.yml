# Runs E2E Playwright tests for Dev-UI components via Maven with report deployment.
name: End-to-End Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-tests:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@37d7d02d2c4615e514cf7b6e4a060806d9611663 # v0.8.0
    with:
      report-name: e-2-e-playwright
      maven-args-input: |
        install -DskipTests -T 1C -am -pl bom,token-sheriff-validation,token-sheriff-quarkus-parent,token-sheriff-quarkus-parent/token-sheriff-validation-quarkus,token-sheriff-quarkus-parent/token-sheriff-validation-quarkus-deployment,token-sheriff-quarkus-parent/token-sheriff-quarkus-integration-tests
        verify -Pe2e-tests -pl token-sheriff-quarkus-parent/e-2-e-playwright
      install-playwright: true
      npm-cache: true
      timeout-minutes: 30
      reports-folder: |
        token-sheriff-quarkus-parent/e-2-e-playwright/target/test-results
      report-logs: |
        token-sheriff-quarkus-parent/e-2-e-playwright/target/quarkus-dev.log
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
