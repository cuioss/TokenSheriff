# Runs multi-IDP integration tests via Maven with report deployment to cuioss.github.io.
# The multi-idp-tests profile is a superset that includes standard integration tests.
name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Required for the GitHub merge queue: without it the queued checks never
  # report and the queue times out (see cuioss-organization v0.8.0).
  merge_group:

permissions:
  contents: read

jobs:
  integration-tests:
    # Multi-IDP tests (Keycloak + Dex + Zitadel) — superset that includes standard integration tests
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@dd1b90a37f4c92f785eb935e57af9d3eba5da85c # v0.10.2
    with:
      report-name: token-sheriff-multi-idp-tests
      maven-args-input: |
        install -DskipTests -DskipITs -pl token-sheriff-validation,token-sheriff-client,token-sheriff-quarkus-parent/token-sheriff-validation-quarkus,token-sheriff-quarkus-parent/token-sheriff-validation-quarkus-deployment,token-sheriff-quarkus-parent/token-sheriff-client-quarkus,token-sheriff-quarkus-parent/token-sheriff-client-quarkus-deployment -am
        verify -Pmulti-idp-tests -pl token-sheriff-quarkus-parent/token-sheriff-quarkus-integration-tests
      reports-folder: |
        token-sheriff-quarkus-parent/token-sheriff-quarkus-integration-tests/target/failsafe-reports
      report-logs: |
        token-sheriff-quarkus-parent/token-sheriff-quarkus-integration-tests/target/app-logs-*.txt
        token-sheriff-quarkus-parent/token-sheriff-quarkus-integration-tests/target/keycloak-logs-*.txt
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
