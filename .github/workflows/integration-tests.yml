# Runs multi-IDP integration tests via Maven with report deployment to cuioss.github.io.
# The multi-idp-tests profile is a superset that includes standard integration tests.
name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    # Multi-IDP tests (Keycloak + Dex + Zitadel) — superset that includes standard integration tests
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@0af17b4211b2db37c3bc9b5f316f0c534c3ee8d5 # v0.6.8
    with:
      report-name: oauth-sheriff-multi-idp-tests
      maven-args-input: |
        install -DskipTests -DskipITs -pl oauth-sheriff-core,oauth-sheriff-quarkus-parent/oauth-sheriff-quarkus,oauth-sheriff-quarkus-parent/oauth-sheriff-quarkus-deployment -am
        verify -Pmulti-idp-tests -pl oauth-sheriff-quarkus-parent/oauth-sheriff-quarkus-integration-tests
      reports-folder: |
        oauth-sheriff-quarkus-parent/oauth-sheriff-quarkus-integration-tests/target/failsafe-reports
      report-logs: |
        oauth-sheriff-quarkus-parent/oauth-sheriff-quarkus-integration-tests/target/app-logs-*.txt
        oauth-sheriff-quarkus-parent/oauth-sheriff-quarkus-integration-tests/target/keycloak-logs-*.txt
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
