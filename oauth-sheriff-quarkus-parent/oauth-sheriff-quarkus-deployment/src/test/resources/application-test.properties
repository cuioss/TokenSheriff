# Test configuration for OAuth Sheriff extension
quarkus.log.level=INFO
quarkus.log.category."de.cuioss.jwt".level=DEBUG

# Sample JWT configuration for testing
sheriff.oauth.issuers.default.issuer-identifier=https://test-auth.example.com
sheriff.oauth.issuers.default.enabled=true
sheriff.oauth.issuers.default.audience-validation-disabled=true

# Parser configuration
sheriff.oauth.parser.max-token-size=8192
