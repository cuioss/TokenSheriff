# JWT Integration Test Application Configuration

# Application metadata
quarkus.application.name=oauth-sheriff-integration-tests
quarkus.application.version=1.0.0-SNAPSHOT

# HTTPS Configuration for native image integration tests (using PEM certificates)
quarkus.http.ssl.certificate.files=/app/certificates/localhost.crt
quarkus.http.ssl.certificate.key-files=/app/certificates/localhost.key
quarkus.http.port=8080
quarkus.http.ssl-port=8443
# HTTPS Configuration - redirect HTTP requests to HTTPS for security
quarkus.http.insecure-requests=redirect

# JWT Configuration for Integration Testing
# Default issuer for static key testing (disabled for Docker integration tests)
sheriff.oauth.issuers.default.issuer-identifier=https://test-auth.example.com
sheriff.oauth.issuers.default.enabled=false
sheriff.oauth.issuers.default.jwks.file-path=classpath:test-jwks.json

# Keycloak issuer for well-known discovery testing
sheriff.oauth.issuers.keycloak.enabled=true
# IMPORTANT: issuer-identifier must match what Keycloak puts in tokens (Docker internal URL)
sheriff.oauth.issuers.keycloak.issuer-identifier=https://keycloak:8443/realms/benchmark
# JWKS URLs use internal Docker hostname for container-to-container communication
sheriff.oauth.issuers.keycloak.jwks.http.well-known-url=https://keycloak:8443/realms/benchmark/.well-known/openid-configuration
sheriff.oauth.issuers.keycloak.expected-client-id=benchmark-client
# Fast refresh for integration tests - retry every 10 seconds instead of 10 minutes
sheriff.oauth.issuers.keycloak.jwks.http.refresh-interval-seconds=10
# Make subject claim optional for benchmark realm (Keycloak access tokens don't include 'sub' by default)
sheriff.oauth.issuers.keycloak.claim-sub-optional=true
# RFC 9068: Token type validation (disabled by default - Keycloak does not set typ: at+jwt)
# sheriff.oauth.issuers.keycloak.expected-token-type=at+jwt
# RFC 9449: DPoP sender-constrained tokens (disabled by default - Keycloak does not natively support DPoP)
# sheriff.oauth.issuers.keycloak.dpop.enabled=true
# sheriff.oauth.issuers.keycloak.dpop.required=false
# sheriff.oauth.issuers.keycloak.dpop.proof-max-age-seconds=300

# Integration issuer for direct JWKS URL testing (uses protocol mappers)
sheriff.oauth.issuers.integration.enabled=true
# IMPORTANT: issuer-identifier must match what Keycloak puts in tokens (Docker internal URL)
sheriff.oauth.issuers.integration.issuer-identifier=https://keycloak:8443/realms/integration
# JWKS URLs use Docker service name for container-to-container communication
sheriff.oauth.issuers.integration.jwks.http.url=https://keycloak:8443/realms/integration/protocol/openid-connect/certs
sheriff.oauth.issuers.integration.expected-client-id=integration-client,dpop-client,jwe-client
# Fast refresh for integration tests - retry every 10 seconds instead of 10 minutes
sheriff.oauth.issuers.integration.jwks.http.refresh-interval-seconds=10
# Subject claim is required since protocol mapper provides it
sheriff.oauth.issuers.integration.claim-sub-optional=false
# RFC 9449: DPoP sender-constrained tokens (integration issuer)
sheriff.oauth.issuers.integration.dpop.enabled=true
sheriff.oauth.issuers.integration.dpop.required=false
sheriff.oauth.issuers.integration.dpop.proof-max-age-seconds=300

# Dex issuer for multi-IDP integration testing (OpenID Certified, lightweight provider)
# Only active when QUARKUS_PROFILE=multi-idp — all keys use %multi-idp prefix so the
# issuer map entry only exists when the profile is active.
%multi-idp.sheriff.oauth.issuers.dex.enabled=true
%multi-idp.sheriff.oauth.issuers.dex.issuer-identifier=https://dex:5556/dex
%multi-idp.sheriff.oauth.issuers.dex.jwks.http.well-known-url=https://dex:5556/dex/.well-known/openid-configuration
%multi-idp.sheriff.oauth.issuers.dex.jwks.http.refresh-interval-seconds=10
%multi-idp.sheriff.oauth.issuers.dex.claim-sub-optional=false

# Zitadel issuer for multi-IDP integration testing (full-featured, OpenID Certified)
# Only active when QUARKUS_PROFILE=multi-idp — uses direct JWKS URL because Zitadel's
# well-known endpoint returns external URLs that are unreachable from inside Docker.
%multi-idp.sheriff.oauth.issuers.zitadel.enabled=true
%multi-idp.sheriff.oauth.issuers.zitadel.issuer-identifier=http://zitadel:3080
%multi-idp.sheriff.oauth.issuers.zitadel.jwks.http.url=http://zitadel:8080/oauth/v2/keys
%multi-idp.sheriff.oauth.issuers.zitadel.jwks.http.refresh-interval-seconds=10
%multi-idp.sheriff.oauth.issuers.zitadel.claim-sub-optional=false

# JWE Decryption Configuration (RFC 7516)
# Private key for decrypting JWE tokens from Keycloak jwe-client
sheriff.oauth.jwe.decryption-key-path=/app/certificates/jwe-test-decryption-key.pem
sheriff.oauth.jwe.decryption-key-id=jwe-test-key
sheriff.oauth.jwe.key-management-algorithms=RSA-OAEP,RSA-OAEP-256
sheriff.oauth.jwe.content-encryption-algorithms=A256GCM,A128GCM,A128CBC-HS256,A256CBC-HS512

# Health Checks
sheriff.oauth.health.enabled=true
sheriff.oauth.health.jwks.cache-seconds=30
sheriff.oauth.health.jwks.timeout-seconds=5

# TLS Configuration for HTTPS endpoints with proper certificate validation
# Uses modern Quarkus TLS Registry for native image compatibility (research-based)
quarkus.ssl.native=true
quarkus.tls.default.trust-store.p12.path=/app/certificates/localhost-truststore.p12
quarkus.tls.default.trust-store.p12.password=localhost-trust

# Metrics Configuration
# Set faster collection interval for integration tests (2s instead of default 10s)
sheriff.oauth.metrics.collection.interval=2s

# Cache Configuration for testing
# ENABLED for performance testing - cache size set to 20 tokens
sheriff.oauth.cache.access-token.max-size=20
sheriff.oauth.cache.access-token.eviction-interval-seconds=10

# Logging - Enhanced for troubleshooting
quarkus.log.level=INFO
quarkus.log.category."de.cuioss.sheriff.oauth".level=INFO
# Enable health check logging
quarkus.log.category."io.quarkus.smallrye.health".level=INFO
# Enable startup logging
quarkus.log.category."io.quarkus.runtime".level=INFO
# Enable native image logging
quarkus.log.category."io.quarkus.runner".level=INFO
# Configure console logging format
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS z} %-5p [%c{3.}] (%t) %s%e%n
# File logging for persistent logs outside container
quarkus.log.file.enable=true
# Use system property LOG_FILE_PATH if set, otherwise default to /quarkus.log
quarkus.log.file.path=${LOG_FILE_PATH:/quarkus.log}
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS z} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=100M
quarkus.log.file.rotation.max-backup-index=5

# HTTP Access Logging - Disable built-in access logging
quarkus.http.access-log.enabled=false

# Custom Access Log Filter Configuration - Log HTTP codes > 205
# Benchmark showed filter overhead is ~0.1ms (negligible vs 1.1ms JWT validation)
cui.http.access-log.filter.enabled=true
cui.http.access-log.filter.min-status-code=206
cui.http.access-log.filter.max-status-code=599

# Development settings
quarkus.live-reload.instrumentation=false

# Native Image Configuration
# Enable HTTPS protocol for JWT well-known discovery and JWKS endpoints
quarkus.native.additional-build-args=--enable-url-protocols=https,--enable-http,--enable-https,-O2
# Java 25 builder image for JEP 491 (Synchronize Virtual Threads without Pinning)
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25

# JFR Configuration for Native Images (2024-2025 best practices)
# Enable JFR for profiling in native images (heapdump adds GC events)
quarkus.native.monitoring=jfr

# TLS Performance Optimization
# Enable TLS 1.3 with 1.2 fallback for better handshake performance
quarkus.tls.protocols=TLSv1.3,TLSv1.2
# Optimize cipher suites for performance (TLS 1.3 prioritized)
quarkus.tls.cipher-suites=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
# Enable ALPN for HTTP/2 support
quarkus.tls.alpn=true
# Include certificates in native image
quarkus.native.resources.includes=**/*.p12,**/*.crt,**/*.key,**/*.pem
# Container memory limit removed for build - will be applied at runtime via Docker
# Build requires unrestricted memory, runtime testing uses Docker --memory=64m

# Virtual Threads Configuration (VERIFIED: 24-30% improvement)
quarkus.virtual-threads.name-prefix=jwt-validation
quarkus.virtual-threads.shutdown-timeout=10s

# Dev mode overrides for E2E Dev-UI testing (host-side, not Docker)
# NOTE: Do NOT override issuer-identifier in dev mode. Keycloak start-dev ignores hostname
# config and puts Docker-internal URLs (https://keycloak:8443/realms/...) in tokens.
# The base config already uses these Docker URLs, which match the token's iss claim.
# The issuer-identifier is only used for string comparison, not URL resolution.

# Use direct JWKS URL instead of well-known discovery for dev mode.
# Well-known discovery fails because Keycloak start-dev returns internal Docker URLs.
# IMPORTANT: Must clear well-known-url because %dev. properties ADD to config, they don't
# replace. Having both url and well-known-url causes a mutual exclusion error.
%dev.sheriff.oauth.issuers.keycloak.jwks.http.well-known-url=
%dev.sheriff.oauth.issuers.keycloak.jwks.http.url=https://localhost:1443/realms/benchmark/protocol/openid-connect/certs
%dev.sheriff.oauth.issuers.integration.jwks.http.url=https://localhost:1443/realms/integration/protocol/openid-connect/certs
%dev.quarkus.http.ssl.certificate.files=src/main/docker/certificates/localhost.crt
%dev.quarkus.http.ssl.certificate.key-files=src/main/docker/certificates/localhost.key
%dev.quarkus.tls.default.trust-store.p12.path=src/main/docker/certificates/localhost-truststore.p12
%dev.quarkus.tls.default.trust-store.p12.password=localhost-trust
%dev.sheriff.oauth.jwe.decryption-key-path=src/main/docker/certificates/jwe-test-decryption-key.pem
%dev.quarkus.http.insecure-requests=enabled
%dev.quarkus.native.enabled=false
%dev.quarkus.log.file.enable=false
