# Minimal test configuration - test profiles provide the actual JWT configuration
quarkus.log.level=INFO
quarkus.log.category."de.cuioss.jwt".level=DEBUG

# Use a random free HTTP port for @QuarkusTest so the fixed default (8081) cannot collide
# across sequential fresh-fork test JVMs (reuseForks=false) when the reactor runs modules in
# parallel (-T) and CPU contention delays port release. @QuarkusTest/RestAssured auto-detect it.
quarkus.http.test-port=0

# JaCoCo coverage configuration for @QuarkusTest
quarkus.jacoco.reuse-data-file=true
