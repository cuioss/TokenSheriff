# E2E Dev-UI Tests - Keycloak for Quarkus Dev Mode
# Purpose: Provide a Keycloak instance accessible from the host for Dev-UI testing
# NOTE: Keycloak start-dev ignores hostname configuration (hostname-strict defaults to false
# and cannot be reliably overridden). Tokens will contain Docker-internal issuer URLs
# (https://keycloak:8443/realms/...). The Token-Sheriff %dev config accepts this by using
# the base config's issuer-identifier (which matches the Docker-internal URL) and direct
# JWKS URLs pointing to the host-mapped port (localhost:1443).

services:
  keycloak:
    # NOTE: Dependabot cannot automatically update this image version.
    # Manual updates required. Check: https://quay.io/keycloak/keycloak
    image: quay.io/keycloak/keycloak:26.4.0
    command:
      - start-dev
      - --import-realm
      - --https-certificate-file=/opt/keycloak/certificates/localhost.crt
      - --https-certificate-key-file=/opt/keycloak/certificates/localhost.key
      - --https-port=8443
    ports:
      - "1443:8443"  # External HTTPS port for Keycloak
      - "1090:9000"  # External port for Keycloak management (health checks)
    volumes:
      - ../token-sheriff-quarkus-integration-tests/src/main/docker/keycloak:/opt/keycloak/data/import:ro
      - ../token-sheriff-quarkus-integration-tests/src/main/docker/certificates:/opt/keycloak/certificates:ro
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_LOG_LEVEL=INFO
      - KC_HTTP_ENABLED=false
      - KC_HTTPS_PORT=8443
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && exec 3<&-"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 30s
    networks:
      - e2e-devui

networks:
  e2e-devui:
    driver: bridge
