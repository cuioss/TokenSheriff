# Integration test configuration with multiple issuers
quarkus.log.level=INFO
quarkus.log.category."de.cuioss.sheriff.token".level=DEBUG

# Default issuer configuration
sheriff.token.issuers.default.issuer-identifier=https://test-auth.example.com
sheriff.token.issuers.default.enabled=true
sheriff.token.issuers.default.audience-validation-disabled=true

# Keycloak issuer configuration
sheriff.token.issuers.keycloak.issuer-identifier=https://keycloak.example.com/auth/realms/master
sheriff.token.issuers.keycloak.enabled=true
sheriff.token.issuers.keycloak.audience-validation-disabled=true

# Global parser configuration
sheriff.token.parser.max-token-size=8192
sheriff.token.parser.max-payload-size=8192
sheriff.token.parser.max-string-length=4096
