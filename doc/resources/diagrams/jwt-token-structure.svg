<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">JWT token structure — header, payload and signature</title>
  <desc  id="desc">A JSON Web Token is three Base64Url-encoded segments joined by dots: a header carrying the signing algorithm and key id, a payload carrying the registered and custom claims, and a signature computed over the header and payload with the issuer's private key.</desc>

  <defs>
    <style>
      .col-header { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .col-sub    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .item       { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .dot        { font-size: 40px; font-weight: 700; fill: #6e7681; text-anchor: middle; }
      .stroke     { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .caption    { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ================= HEADER ================= -->
  <text x="140" y="28" class="col-header">HEADER</text>
  <rect class="stroke" x="20" y="44" width="240" height="360" rx="6" ry="6"/>
  <text x="36" y="88"  class="item">alg: RS256</text>
  <text x="36" y="114" class="item">typ: JWT</text>
  <text x="36" y="140" class="item">kid: key-123</text>
  <text x="140" y="388" class="col-sub">Base64Url-encoded</text>

  <!-- dot separator (header . payload) -->
  <text x="295" y="262" class="dot">.</text>

  <!-- ================= PAYLOAD ================= -->
  <text x="450" y="28" class="col-header">PAYLOAD</text>
  <rect class="stroke" x="330" y="44" width="240" height="360" rx="6" ry="6"/>
  <text x="346" y="88"  class="item">iss: auth.example.com</text>
  <text x="346" y="112" class="item">sub: user@example.com</text>
  <text x="346" y="136" class="item">aud: api.example.com</text>
  <text x="346" y="160" class="item">exp: 1735862400</text>
  <text x="346" y="184" class="item">nbf: 1735776000</text>
  <text x="346" y="208" class="item">iat: 1735776000</text>
  <text x="346" y="232" class="item">jti: abc-123-xyz</text>
  <text x="346" y="256" class="item" font-style="italic">… custom claims</text>
  <text x="450" y="388" class="col-sub">Base64Url-encoded</text>

  <!-- dot separator (payload . signature) -->
  <text x="605" y="262" class="dot">.</text>

  <!-- ================= SIGNATURE ================= -->
  <text x="760" y="28" class="col-header">SIGNATURE</text>
  <rect class="stroke" x="640" y="44" width="240" height="360" rx="6" ry="6"/>
  <text x="656" y="88"  class="item">RSA-SHA256(</text>
  <text x="656" y="112" class="item">&#160;&#160;b64url(header) + "." +</text>
  <text x="656" y="136" class="item">&#160;&#160;b64url(payload),</text>
  <text x="656" y="160" class="item">&#160;&#160;privateKey</text>
  <text x="656" y="184" class="item">)</text>
  <text x="760" y="388" class="col-sub">Base64Url-encoded</text>

  <!-- Footer caption -->
  <text x="450" y="440" class="caption">header . payload . signature — three Base64Url segments joined by dots</text>
</svg>
