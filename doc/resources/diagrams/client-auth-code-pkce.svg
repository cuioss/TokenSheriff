<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Confidential authorization-code + PKCE flow (server-side)</title>
  <desc  id="desc">A synchronous confidential-client flow across four participants: the browser, the client engine (backend), the commons transport, and the authorization server. The client builds a PKCE-protected authorization request, optionally pushed via PAR; the user authenticates at the AS front channel; the form_post callback returns the code with no token in the URL; the client verifies state and iss, exchanges the code over the back channel through commons, validates the tokens, stores them server-side, and returns only a session cookie to the browser.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header   { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke       { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep          { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .arrow        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return { stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill   { fill: #6e7681; }
      .arrow-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .activation   { stroke: #6e7681; stroke-width: 0.8; fill: #6e7681; opacity: 0.15; }
      .col-sub      { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .phase-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; font-weight: 600; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ===== actors + lifelines ===== -->
  <text x="120" y="30" class="col-header">Browser</text>
  <rect class="stroke" x="50"  y="42" width="140" height="34" rx="6" ry="6"/>
  <line class="sep" x1="120" y1="80" x2="120" y2="662"/>

  <text x="390" y="30" class="col-header">Client engine</text>
  <rect class="stroke" x="318" y="42" width="144" height="34" rx="6" ry="6"/>
  <line class="sep" x1="390" y1="80" x2="390" y2="662"/>

  <text x="630" y="30" class="col-header">commons transport</text>
  <rect class="stroke" x="548" y="42" width="164" height="34" rx="6" ry="6"/>
  <line class="sep" x1="630" y1="80" x2="630" y2="662"/>

  <text x="860" y="30" class="col-header">Auth Server</text>
  <rect class="stroke" x="790" y="42" width="140" height="34" rx="6" ry="6"/>
  <line class="sep" x1="860" y1="80" x2="860" y2="662"/>

  <!-- ===== activation bars ===== -->
  <rect class="activation" x="385" y="128" width="10" height="470"/>
  <rect class="activation" x="625" y="188" width="10" height="50"/>
  <rect class="activation" x="855" y="213" width="10" height="25"/>
  <rect class="activation" x="855" y="326" width="10" height="28"/>
  <rect class="activation" x="625" y="482" width="10" height="50"/>
  <rect class="activation" x="855" y="507" width="10" height="25"/>

  <!-- ===== phase 1: Authorization request ===== -->
  <line class="sep" x1="30" y1="105" x2="410" y2="105"/>
  <line class="sep" x1="530" y1="105" x2="950" y2="105"/>
  <text x="470" y="109" class="phase-lbl">Authorization request</text>

  <line class="arrow" x1="120" y1="128" x2="383" y2="128" marker-end="url(#arrow)"/>
  <text x="252" y="120" class="arrow-lbl">start login</text>

  <path class="arrow" d="M 397 148 Q 447 148 447 160 Q 447 172 397 172" marker-end="url(#arrow)"/>
  <text x="455" y="156" class="arrow-lbl" text-anchor="start">build request · PKCE S256 · state · nonce</text>

  <line class="arrow" x1="395" y1="192" x2="623" y2="192" marker-end="url(#arrow)"/>
  <text x="512" y="184" class="arrow-lbl">PAR: push params</text>
  <line class="arrow" x1="635" y1="217" x2="853" y2="217" marker-end="url(#arrow)"/>
  <text x="744" y="209" class="arrow-lbl">POST /par</text>
  <line class="arrow-return" x1="625" y1="238" x2="397" y2="238" marker-end="url(#arrow)"/>
  <text x="512" y="230" class="arrow-lbl">request_uri</text>

  <line class="arrow-return" x1="383" y1="268" x2="122" y2="268" marker-end="url(#arrow)"/>
  <text x="252" y="260" class="arrow-lbl">302 → authorize (request_uri)</text>

  <!-- ===== phase 2: User authenticates ===== -->
  <line class="sep" x1="30" y1="298" x2="405" y2="298"/>
  <line class="sep" x1="535" y1="298" x2="950" y2="298"/>
  <text x="470" y="302" class="phase-lbl">User authenticates (front channel)</text>

  <line class="arrow" x1="120" y1="326" x2="853" y2="326" marker-end="url(#arrow)"/>
  <text x="440" y="318" class="arrow-lbl">authenticate + consent</text>
  <line class="arrow-return" x1="853" y1="354" x2="122" y2="354" marker-end="url(#arrow)"/>
  <text x="440" y="346" class="arrow-lbl">form_post callback — code, state, iss</text>
  <text x="440" y="378" class="col-sub">no token in the URL</text>

  <!-- ===== phase 3: Code exchange ===== -->
  <line class="sep" x1="30" y1="400" x2="410" y2="400"/>
  <line class="sep" x1="530" y1="400" x2="950" y2="400"/>
  <text x="470" y="404" class="phase-lbl">Code exchange (back channel)</text>

  <line class="arrow" x1="120" y1="424" x2="383" y2="424" marker-end="url(#arrow)"/>
  <text x="252" y="416" class="arrow-lbl">callback (code, state, iss)</text>

  <path class="arrow" d="M 397 444 Q 447 444 447 456 Q 447 468 397 468" marker-end="url(#arrow)"/>
  <text x="455" y="452" class="arrow-lbl" text-anchor="start">verify state · verify iss</text>

  <line class="arrow" x1="395" y1="488" x2="623" y2="488" marker-end="url(#arrow)"/>
  <text x="512" y="480" class="arrow-lbl">exchange code (+ verifier, client auth)</text>
  <line class="arrow" x1="635" y1="511" x2="853" y2="511" marker-end="url(#arrow)"/>
  <text x="744" y="503" class="arrow-lbl">POST /token</text>
  <line class="arrow-return" x1="625" y1="532" x2="397" y2="532" marker-end="url(#arrow)"/>
  <text x="512" y="524" class="arrow-lbl">tokens + id_token</text>

  <path class="arrow" d="M 397 552 Q 447 552 447 564 Q 447 576 397 576" marker-end="url(#arrow)"/>
  <text x="455" y="560" class="arrow-lbl" text-anchor="start">validate tokens · store server-side</text>

  <line class="arrow-return" x1="383" y1="598" x2="122" y2="598" marker-end="url(#arrow)"/>
  <text x="252" y="590" class="arrow-lbl">session cookie — no token</text>

  <!-- caption -->
  <text x="470" y="700" class="caption">The browser never receives a usable token — only a session artifact; all back-channel HTTP goes through the commons transport.</text>
</svg>
