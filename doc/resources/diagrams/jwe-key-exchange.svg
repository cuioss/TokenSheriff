<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 470"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">OIDC encryption-key exchange</title>
  <desc  id="desc">The resource server publishes a JWKS containing both a signing key and an encryption key. It registers its jwks_uri with the authorization server; the AS fetches the JWKS, filters for the use:enc key, and encrypts issued tokens with it, producing a JWE wrapping the signed JWS.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header   { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke       { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep          { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .arrow        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return { stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill   { fill: #6e7681; }
      .arrow-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .activation   { stroke: #6e7681; stroke-width: 0.8; fill: #6e7681; opacity: 0.15; }
      .col-sub      { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ===== actors + lifelines ===== -->
  <text x="190" y="30" class="col-header">Resource Server / RP</text>
  <rect class="stroke" x="90"  y="42" width="200" height="34" rx="6" ry="6"/>
  <line class="sep" x1="190" y1="80" x2="190" y2="410"/>
  <text x="190" y="100" class="col-sub">publishes JWKS:</text>
  <text x="190" y="116" class="col-sub">use:sig (s1) · use:enc (e1)</text>

  <text x="500" y="30" class="col-header">Authorization Server</text>
  <rect class="stroke" x="400" y="42" width="200" height="34" rx="6" ry="6"/>
  <line class="sep" x1="500" y1="80" x2="500" y2="410"/>

  <!-- ===== activation bars ===== -->
  <rect class="activation" x="495" y="150" width="10" height="180"/>
  <rect class="activation" x="185" y="190" width="10" height="36"/>

  <!-- ===== messages ===== -->
  <line class="arrow" x1="190" y1="150" x2="493" y2="150" marker-end="url(#arrow)"/>
  <text x="345" y="142" class="arrow-lbl">register (jwks_uri or inline jwks)</text>

  <line class="arrow" x1="495" y1="190" x2="197" y2="190" marker-end="url(#arrow)"/>
  <text x="345" y="182" class="arrow-lbl">GET jwks_uri</text>

  <line class="arrow-return" x1="195" y1="226" x2="493" y2="226" marker-end="url(#arrow)"/>
  <text x="345" y="218" class="arrow-lbl">JWKS: sig + enc keys</text>

  <!-- AS self-steps -->
  <path class="arrow" d="M 512 250 Q 562 250 562 262 Q 562 274 512 274" marker-end="url(#arrow)"/>
  <text x="575" y="266" class="arrow-lbl" text-anchor="start">filter use:'enc' key</text>

  <path class="arrow" d="M 512 294 Q 562 294 562 306 Q 562 318 512 318" marker-end="url(#arrow)"/>
  <text x="575" y="310" class="arrow-lbl" text-anchor="start">encrypt with RS enc key</text>

  <text x="500" y="352" class="col-sub">→ JWE( JWS(claims) )</text>

  <!-- caption -->
  <text x="390" y="446" class="caption">The RS owns the encryption key pair; the AS only ever holds the public half, fetched from the JWKS.</text>
</svg>
