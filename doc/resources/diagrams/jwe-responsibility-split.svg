<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">JWE decryption — library vs Quarkus-runtime responsibilities</title>
  <desc  id="desc">The token-sheriff-validation library owns the crypto surface — JweDecryptionConfig, JweDecryptor and the JWE detection in NonValidatingJwtParser — and knows nothing of file paths, keystores, JWKS endpoints or rotation. The token-sheriff-validation-quarkus runtime owns key loading, the encryption-key JWKS endpoint and key rotation, and passes the loaded keys down to the library.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .col-sub    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .name       { font-size: 12px; font-weight: 700; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .detail     { font-size: 11px; fill: #6e7681; font-style: italic; }
      .neg        { font-size: 11px; fill: #6e7681; font-style: italic; font-weight: 600; }
      .stroke     { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .arrow      { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill { fill: #6e7681; }
      .arrow-lbl  { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .sep        { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .caption    { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ================= LIBRARY ================= -->
  <text x="220" y="30" class="col-header">LIBRARY</text>
  <text x="220" y="48" class="col-sub">token-sheriff-validation</text>
  <rect class="stroke" x="30" y="62" width="380" height="296" rx="6" ry="6"/>

  <text x="50" y="102" class="name">JweDecryptionConfig</text>
  <text x="50" y="121" class="detail">kid→key map · default key · alg prefs</text>

  <text x="50" y="158" class="name">JweDecryptor</text>
  <text x="50" y="177" class="detail">pure JDK crypto · CEK + content · memory-clear</text>

  <text x="50" y="214" class="name">NonValidatingJwtParser</text>
  <text x="50" y="233" class="detail">detect 5-part JWE · return inner JWS</text>

  <line class="sep" x1="50" y1="268" x2="390" y2="268"/>
  <text x="50" y="296" class="neg">Does not handle</text>
  <text x="50" y="318" class="detail">file paths · keystores · JWKS · key rotation</text>

  <!-- ================= RUNTIME ================= -->
  <text x="680" y="30" class="col-header">RUNTIME</text>
  <text x="680" y="48" class="col-sub">token-sheriff-validation-quarkus</text>
  <rect class="stroke" x="490" y="62" width="380" height="296" rx="6" ry="6"/>

  <text x="510" y="102" class="name">DecryptionKeyLoader</text>
  <text x="510" y="121" class="detail">PEM / KeyStore / P12 · clear pw · validate</text>

  <text x="510" y="158" class="name">JWKS Endpoint (enc)</text>
  <text x="510" y="177" class="detail">publish RS public key · use: "enc"</text>

  <text x="510" y="214" class="name">Key Rotation Manager</text>
  <text x="510" y="233" class="detail">grace period · rebuild config on change</text>

  <line class="sep" x1="510" y1="268" x2="850" y2="268"/>
  <text x="510" y="296" class="neg">Handles</text>
  <text x="510" y="318" class="detail">key loading · config · JWKS enc · rotation · pw</text>

  <!-- arrow: runtime passes keys to library -->
  <line class="arrow" x1="488" y1="200" x2="412" y2="200" marker-end="url(#arrow)"/>
  <text x="450" y="192" class="arrow-lbl">passes keys</text>

  <!-- caption -->
  <text x="450" y="398" class="caption">The library moves and clears bytes; the runtime finds and rotates the keys.</text>
</svg>
