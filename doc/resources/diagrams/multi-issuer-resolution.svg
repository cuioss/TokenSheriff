<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Multi-issuer token validation — resolving the right issuer config</title>
  <desc  id="desc">A synchronous sequence: the application asks TokenValidator to validate a token; the validator decodes it and extracts the iss claim, resolves the matching configuration from the IssuerConfigCache (which holds several issuer configs), obtains the signing key from that issuer's JwksLoader, verifies the signature and claims, and returns typed content.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header   { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke       { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep          { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .arrow        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return { stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill   { fill: #6e7681; }
      .arrow-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .activation   { stroke: #6e7681; stroke-width: 0.8; fill: #6e7681; opacity: 0.15; }
      .col-sub      { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ===== actors + lifelines ===== -->
  <text x="90"  y="30" class="col-header">Application</text>
  <rect class="stroke" x="20"  y="42" width="140" height="34" rx="6" ry="6"/>
  <line class="sep" x1="90"  y1="80" x2="90"  y2="452"/>

  <text x="345" y="30" class="col-header">TokenValidator</text>
  <rect class="stroke" x="272" y="42" width="146" height="34" rx="6" ry="6"/>
  <line class="sep" x1="345" y1="80" x2="345" y2="452"/>

  <text x="600" y="30" class="col-header">IssuerConfigCache</text>
  <rect class="stroke" x="518" y="42" width="164" height="34" rx="6" ry="6"/>
  <line class="sep" x1="600" y1="80" x2="600" y2="452"/>
  <text x="600" y="102" class="col-sub">holds N issuer configs;</text>
  <text x="600" y="117" class="col-sub">iss selects one</text>

  <text x="850" y="30" class="col-header">JwksLoader</text>
  <rect class="stroke" x="778" y="42" width="144" height="34" rx="6" ry="6"/>
  <line class="sep" x1="850" y1="80" x2="850" y2="452"/>

  <!-- ===== activation bars ===== -->
  <rect class="activation" x="340" y="150" width="10" height="248"/>
  <rect class="activation" x="595" y="212" width="10" height="40"/>
  <rect class="activation" x="845" y="290" width="10" height="40"/>

  <!-- ===== messages ===== -->
  <!-- validate -->
  <line class="arrow" x1="90" y1="150" x2="338" y2="150" marker-end="url(#arrow)"/>
  <text x="214" y="142" class="arrow-lbl">validateAccessToken(token)</text>

  <!-- self: decode + extract iss -->
  <path class="arrow" d="M 352 168 Q 402 168 402 180 Q 402 192 352 192" marker-end="url(#arrow)"/>
  <text x="470" y="184" class="arrow-lbl">decode · extract iss</text>

  <!-- resolveConfig -->
  <line class="arrow" x1="350" y1="222" x2="593" y2="222" marker-end="url(#arrow)"/>
  <text x="472" y="214" class="arrow-lbl">resolveConfig(iss)</text>

  <!-- return IssuerConfig -->
  <line class="arrow-return" x1="595" y1="252" x2="352" y2="252" marker-end="url(#arrow)"/>
  <text x="472" y="244" class="arrow-lbl">IssuerConfig</text>

  <!-- getKeyInfo -->
  <line class="arrow" x1="350" y1="300" x2="843" y2="300" marker-end="url(#arrow)"/>
  <text x="598" y="292" class="arrow-lbl">getKeyInfo(kid)</text>

  <!-- return KeyInfo -->
  <line class="arrow-return" x1="845" y1="330" x2="352" y2="330" marker-end="url(#arrow)"/>
  <text x="598" y="322" class="arrow-lbl">KeyInfo</text>

  <!-- self: verify -->
  <path class="arrow" d="M 352 348 Q 402 348 402 360 Q 402 372 352 372" marker-end="url(#arrow)"/>
  <text x="470" y="364" class="arrow-lbl">verify signature + claims</text>

  <!-- return AccessTokenContent -->
  <line class="arrow-return" x1="340" y1="398" x2="90" y2="398" marker-end="url(#arrow)"/>
  <text x="214" y="390" class="arrow-lbl">AccessTokenContent</text>

  <!-- caption -->
  <text x="470" y="484" class="caption">One validator, many issuers: the token's iss claim selects the matching config, whose JwksLoader supplies the key.</text>
</svg>
