<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">JWKS key management — load, retrieve and rotate with a grace period</title>
  <desc  id="desc">Three phases. Initialization: IssuerConfig initialises the HttpJwksLoader, which fetches the JWKS and stores it as the current keys. Retrieval: getKeyInfo looks up the current keys, falling back to retired keys during the rotation grace period. Rotation: a periodic refresh re-fetches the JWKS and, on change, moves the old keys to retired (kept valid during the grace period), installs the new keys as current, and purges expired keys.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header   { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke       { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep          { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .arrow        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return { stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill   { fill: #6e7681; }
      .arrow-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .activation   { stroke: #6e7681; stroke-width: 0.8; fill: #6e7681; opacity: 0.15; }
      .col-sub      { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .phase-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; font-weight: 600; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ===== actors + lifelines ===== -->
  <text x="150" y="30" class="col-header">IssuerConfig</text>
  <rect class="stroke" x="80"  y="42" width="140" height="34" rx="6" ry="6"/>
  <line class="sep" x1="150" y1="80" x2="150" y2="512"/>

  <text x="450" y="30" class="col-header">HttpJwksLoader</text>
  <rect class="stroke" x="378" y="42" width="144" height="34" rx="6" ry="6"/>
  <line class="sep" x1="450" y1="80" x2="450" y2="512"/>

  <text x="750" y="30" class="col-header">JWKS Endpoint</text>
  <rect class="stroke" x="680" y="42" width="140" height="34" rx="6" ry="6"/>
  <line class="sep" x1="750" y1="80" x2="750" y2="512"/>

  <!-- ===== phase 1 divider: Initialization ===== -->
  <line class="sep" x1="40" y1="108" x2="405" y2="108"/>
  <line class="sep" x1="495" y1="108" x2="860" y2="108"/>
  <text x="450" y="112" class="phase-lbl">Initialization</text>

  <!-- messages: init -->
  <rect class="activation" x="445" y="128" width="10" height="104"/>
  <line class="arrow" x1="150" y1="128" x2="443" y2="128" marker-end="url(#arrow)"/>
  <text x="300" y="120" class="arrow-lbl">initJWKSLoader()</text>

  <rect class="activation" x="745" y="158" width="10" height="34"/>
  <line class="arrow" x1="455" y1="158" x2="743" y2="158" marker-end="url(#arrow)"/>
  <text x="600" y="150" class="arrow-lbl">fetch JWKS</text>
  <line class="arrow-return" x1="745" y1="192" x2="457" y2="192" marker-end="url(#arrow)"/>
  <text x="600" y="184" class="arrow-lbl">public keys</text>

  <text x="560" y="222" class="col-sub">store → current keys</text>

  <!-- ===== phase 2 divider: Key retrieval ===== -->
  <line class="sep" x1="40" y1="252" x2="405" y2="252"/>
  <line class="sep" x1="495" y1="252" x2="860" y2="252"/>
  <text x="450" y="256" class="phase-lbl">Key retrieval</text>

  <rect class="activation" x="445" y="272" width="10" height="70"/>
  <line class="arrow" x1="150" y1="272" x2="443" y2="272" marker-end="url(#arrow)"/>
  <text x="300" y="264" class="arrow-lbl">getKeyInfo(kid)</text>
  <text x="450" y="298" class="col-sub">lookup current; else retired (grace period)</text>
  <line class="arrow-return" x1="445" y1="330" x2="152" y2="330" marker-end="url(#arrow)"/>
  <text x="300" y="322" class="arrow-lbl">KeyInfo</text>

  <!-- ===== phase 3 divider: Rotation (periodic) ===== -->
  <line class="sep" x1="40" y1="360" x2="388" y2="360"/>
  <line class="sep" x1="512" y1="360" x2="860" y2="360"/>
  <text x="450" y="364" class="phase-lbl">Rotation (periodic)</text>

  <rect class="activation" x="445" y="380" width="10" height="94"/>
  <!-- self: periodic refresh -->
  <path class="arrow" d="M 457 384 Q 507 384 507 396 Q 507 408 457 408" marker-end="url(#arrow)"/>
  <text x="588" y="392" class="arrow-lbl">periodic refresh</text>

  <rect class="activation" x="745" y="430" width="10" height="34"/>
  <line class="arrow" x1="455" y1="430" x2="743" y2="430" marker-end="url(#arrow)"/>
  <text x="600" y="422" class="arrow-lbl">fetch JWKS</text>
  <line class="arrow-return" x1="745" y1="464" x2="457" y2="464" marker-end="url(#arrow)"/>
  <text x="600" y="456" class="arrow-lbl">new keys</text>

  <text x="450" y="494" class="col-sub">on change: current → retired (grace), new → current, purge expired</text>

  <!-- caption -->
  <text x="450" y="540" class="caption">Retired keys stay valid during the grace period, so tokens signed just before a rotation still verify.</text>
</svg>
