<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Multi-IdP integration-test container topology</title>
  <desc  id="desc">One Docker Compose network, jwt-integration, hosts the TokenSheriff integration-test runner and three OpenID providers: Keycloak, which is always started, plus Dex and Zitadel behind Compose profiles. The tests obtain and validate tokens from each provider. A Postgres container backs Zitadel.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .node-header { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .node-sub    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .port        { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; text-anchor: middle; }
      .hub-stroke  { stroke: #6e7681; stroke-width: 1.6; fill: none; }
      .spoke       { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .net         { stroke: #6e7681; stroke-width: 1; fill: none; stroke-dasharray: 4 4; }
      .net-lbl     { font-size: 12px; fill: #6e7681; text-anchor: start; font-style: italic; font-weight: 600; }
      .arrow       { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .connector   { stroke: #6e7681; stroke-width: 1; fill: none; }
      .arrow-fill  { fill: #6e7681; }
      .edge-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .caption     { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- Docker network boundary -->
  <rect class="net" x="24" y="44" width="852" height="452" rx="8" ry="8"/>
  <text x="44" y="70" class="net-lbl">Docker Compose network — jwt-integration</text>

  <!-- ===== Test runner (hub / primary, left) ===== -->
  <rect class="hub-stroke" x="70" y="250" width="200" height="108" rx="8" ry="8"/>
  <text x="170" y="288" class="node-header">Integration Tests</text>
  <text x="170" y="310" class="port">:8443</text>
  <text x="170" y="332" class="node-sub">the test runner</text>

  <!-- ===== IdP stack (right) ===== -->
  <rect class="spoke" x="580" y="118" width="220" height="80" rx="6" ry="6"/>
  <text x="690" y="150" class="node-header">Keycloak</text>
  <text x="690" y="172" class="port">:8443</text>
  <text x="690" y="190" class="node-sub">always-on</text>

  <rect class="spoke" x="580" y="222" width="220" height="80" rx="6" ry="6"/>
  <text x="690" y="254" class="node-header">Dex</text>
  <text x="690" y="276" class="port">:5556</text>
  <text x="690" y="294" class="node-sub">profile-gated</text>

  <rect class="spoke" x="580" y="326" width="220" height="80" rx="6" ry="6"/>
  <text x="690" y="358" class="node-header">Zitadel</text>
  <text x="690" y="380" class="port">:8080</text>
  <text x="690" y="398" class="node-sub">profile-gated</text>

  <!-- Postgres backing Zitadel -->
  <rect class="spoke" x="580" y="430" width="220" height="58" rx="6" ry="6"/>
  <text x="690" y="456" class="node-header" font-size="13">Postgres</text>
  <text x="690" y="476" class="node-sub">:5432 · profile · backs Zitadel</text>

  <!-- ===== connectors: test runner -> each IdP ===== -->
  <line class="arrow" x1="272" y1="292" x2="576" y2="160" marker-end="url(#arrow)"/>
  <line class="arrow" x1="272" y1="302" x2="576" y2="262" marker-end="url(#arrow)"/>
  <line class="arrow" x1="272" y1="312" x2="576" y2="362" marker-end="url(#arrow)"/>
  <text x="366" y="270" class="edge-lbl">validates tokens</text>

  <!-- Zitadel -> Postgres -->
  <line class="connector" x1="690" y1="406" x2="690" y2="428" marker-end="url(#arrow)"/>

  <!-- Footer caption -->
  <text x="450" y="534" class="caption">One Compose network — Keycloak always; Dex and Zitadel behind profiles; Postgres backs Zitadel.</text>
</svg>
